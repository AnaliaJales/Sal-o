{% macro render_pagination(url, page, total_pages) %}
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
        {# Link para a página anterior #}
        <li class="page-item {% if page <= 1 %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(url, page=page - 1) }}">Anterior</a>
        </li>

        {# Links para as páginas #}
        {% for p in range(1, total_pages + 1) %}
        <li class="page-item {% if p == page %}active{% endif %}">
            <a class="page-link" href="{{ url_for(url, page=p) }}">{{ p }}</a>
        </li>
        {% endfor %}

        {# Link para a próxima página #}
        <li class="page-item {% if page >= total_pages %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(url, page=page + 1) }}">Próxima</a>
        </li>
    </ul>
</nav>
{% endmacro %}
